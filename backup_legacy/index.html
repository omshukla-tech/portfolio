 <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
      background:#050816;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      color:white;
    }

    /* Animated Background */

    .bg{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(0,255,255,0.08);
      animation: float 10s infinite linear;
      filter: blur(2px);
    }

    .circle:nth-child(1){
      width:300px;
      height:300px;
      left:-100px;
      top:20%;
      animation-duration:15s;
    }

    .circle:nth-child(2){
      width:200px;
      height:200px;
      right:-50px;
      top:10%;
      animation-duration:12s;
    }

    .circle:nth-child(3){
      width:250px;
      height:250px;
      bottom:-100px;
      left:35%;
      animation-duration:18s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px) rotate(0deg);
      }
      50%{
        transform:translateY(-40px) rotate(180deg);
      }
      100%{
        transform:translateY(0px) rotate(360deg);
      }
    }

    /* Card */

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:700px;
      padding:50px;
      border-radius:30px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.1);
      text-align:center;
      box-shadow:0 0 40px rgba(0,255,255,0.15);
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:55px;
      font-weight:700;
      margin-bottom:15px;
      background:linear-gradient(90deg,#00f5ff,#7b61ff,#00f5ff);
      background-size:300%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation: gradientMove 5s linear infinite;
    }

    @keyframes gradientMove{
      0%{
        background-position:0%;
      }
      100%{
        background-position:300%;
      }
    }

    p{
      font-size:18px;
      color:#d7d7d7;
      line-height:1.8;
      margin-bottom:35px;
    }

    /* Loader */

    .loader{
      width:120px;
      height:120px;
      border-radius:50%;
      border:6px solid rgba(255,255,255,0.1);
      border-top:6px solid #00f5ff;
      margin:0 auto 30px;
      animation: spin 1.2s linear infinite;
      position:relative;
    }

    .loader::before{
      content:'';
      position:absolute;
      inset:15px;
      border-radius:50%;
      border:5px solid transparent;
      border-top:5px solid #7b61ff;
      animation: spinReverse 2s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @keyframes spinReverse{
      100%{
        transform:rotate(-360deg);
      }
    }

    /* Progress */

    .progress-box{
      width:100%;
      height:12px;
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      overflow:hidden;
      margin-top:25px;
    }

    .progress{
      height:100%;
      width:70%;
      background:linear-gradient(90deg,#00f5ff,#7b61ff);
      border-radius:20px;
      animation: loading 3s infinite;
    }

    @keyframes loading{
      0%{
        width:0%;
      }
      50%{
        width:75%;
      }
      100%{
        width:100%;
      }
    }

    .status{
      margin-top:18px;
      font-size:14px;
      letter-spacing:3px;
      color:#9ca3af;
      text-transform:uppercase;
      animation: blink 1.5s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0.4;
      }
    }

    /* Responsive */

    @media(max-width:700px){

      .container{
        padding:35px 25px;
      }

      h1{
        font-size:38px;
      }

      p{
        font-size:15px;
      }

      .loader{
        width:90px;
        height:90px;
      }
    }

  </style>
